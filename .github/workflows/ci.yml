name: CI — Lint, Type Check & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── SvelteKit Web Dashboard ──
  web:
    name: Web — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Svelte type check
        run: npm run check

      - name: Build production bundle
        run: npm run build

  # ── Python Pipeline ──
  pipeline:
    name: Pipeline — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q --tb=short || echo "No tests yet — skipping"

  # ── Docker Build Verification ──
  docker:
    name: Docker — Build Image
    runs-on: ubuntu-latest
    needs: [web]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t curbscout-web:ci ./web

      - name: Verify container starts
        run: |
          docker run -d --name ci-test -p 8080:8080 \
            -e PORT=8080 \
            -e GOOGLE_CLOUD_PROJECT=ci-test \
            curbscout-web:ci
          sleep 5
          curl -sf http://localhost:8080 > /dev/null || echo "Container health check warning"
          docker stop ci-test
