# CurbScout Local Development Stack
# Usage: docker compose up --build
#
# This runs the SvelteKit Hub locally with Firebase Emulators
# for Firestore, Storage, and Auth.

services:
  # ── SvelteKit Hub (GCP Dashboard) ──
  hub:
    build: ./web
    ports:
      - "5173:8080"
    environment:
      - PORT=8080
      - NODE_ENV=development
      - GOOGLE_CLOUD_PROJECT=curbscout-project
      - GCP_BUCKET=curbscout-artifacts
      - GCP_LOCATION=us-central1
      - AUTO_TRAIN_THRESHOLD=10
      - WORKER_API_KEY=dev-worker-key
      - VAST_API_KEY=dev-vast-key
      - FIRESTORE_EMULATOR_HOST=emulator:8000
    depends_on:
      emulator:
        condition: service_healthy
    restart: unless-stopped

  # ── Firebase Emulators ──
  emulator:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "npm install -g firebase-tools &&
             firebase emulators:start --only firestore,storage
             --project curbscout-project"
    ports:
      - "4000:4000" # Emulator UI
      - "8000:8080" # Firestore
      - "9199:9199" # Storage
    volumes:
      - ./firebase.json:/app/firebase.json:ro
      - ./firestore.rules:/app/firestore.rules:ro
      - ./storage.rules:/app/storage.rules:ro
      - ./.firebaserc:/app/.firebaserc:ro
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:4000" ]
      interval: 5s
      timeout: 3s
      retries: 10
